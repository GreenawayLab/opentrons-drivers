<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}opentrons_control{% endblock %}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 920px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
    h1 { margin: 0; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
    th { background: #f5f5f5; }
    label { display: block; margin-top: 0.6rem; font-size: 0.9rem; }
    input, textarea, select { width: 100%; padding: 0.4rem; margin-top: 0.2rem; box-sizing: border-box; }
    input[type=checkbox] { width: auto; margin: 0 0.4rem 0 0; }
    textarea { font-family: monospace; min-height: 8rem; }
    button { padding: 0.5rem 1rem; cursor: pointer; margin-top: 0.8rem; }
    fieldset { margin-top: 0.8rem; border: 1px solid #ddd; border-radius: 4px; }
    label.check { display: block; margin-top: 0.3rem; font-size: 1rem; }
    .error, .fail { color: #b00; }
    .fail { font-weight: 600; }
    .ok { color: #1a7f37; font-weight: 600; }
    .muted { color: #888; }
    .note { background: #fff8e1; border: 1px solid #ffe082; padding: 0.6rem 0.8rem; border-radius: 4px; }
    .bar { display: flex; justify-content: space-between; align-items: center; }
    .bar form { margin: 0; }
    .bar button { margin: 0; }
    .nav { display: flex; gap: 1rem; align-items: center; }
    .nav a { color: #0969da; text-decoration: none; }
    .nav a:hover { text-decoration: underline; }
  </style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
