{% extends "base.html" %}
{% block title %}Configs{% endblock %}
{% block body %}
  {% include "user/_tabs.html" %}

  <div id="msg"></div>

  <div class="bar">
    <h2>My configs</h2>
    <a href="/user/deck" class="btn-new">New config</a>
  </div>
  <table id="mine-table">
    <thead><tr><th>Name</th><th>Version</th><th>Heritage</th><th></th></tr></thead>
    <tbody></tbody>
  </table>

  <div id="versions-panel"></div>

  <h2>Other users' configs</h2>
  <table id="others-table">
    <thead><tr><th>Owner</th><th>Name</th><th>Version</th><th></th></tr></thead>
    <tbody></tbody>
  </table>

<style>
  .bar { display: flex; justify-content: space-between; align-items: center; }
  table { margin: 0.5rem 0 1.5rem; }
  #mine-table td, #mine-table th, #others-table td, #others-table th { padding: 6px 10px; text-align: left; }
  button.small { font-size: 12px; }
  button.danger { color: #a32d2d; }
  td a { margin-right: 8px; }
  .btn-new { display: inline-block; padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; text-decoration: none; color: #000; }
  .btn-new:hover { background: #f5f5f5; }
  #versions-panel { background: #fafafa; border: 1px solid #eee; border-radius: 6px; padding: 8px 12px; margin: -1rem 0 1.5rem; }
  #versions-panel:empty { display: none; }
  #msg .error { color: #a32d2d; } #msg .ok { color: #0f6e56; }
</style>

<script>
function msg(t, ok) { document.getElementById("msg").innerHTML = t ? `<p class="${ok ? "ok" : "error"}">${t}</p>` : ""; }
async function api(method, path, body) {
  const opt = { method, headers: {} };
  if (body !== undefined) { opt.headers["Content-Type"] = "application/json"; opt.body = JSON.stringify(body); }
  const r = await fetch(path, opt);
  let d = null; try { d = await r.json(); } catch (_) {}
  if (!r.ok) {
    let detail = (d && (d.detail || d.error)) || `HTTP ${r.status}`;
    if (Array.isArray(detail)) detail = detail.map(x => x.msg || JSON.stringify(x)).join("; ");
    throw new Error(detail);
  }
  return d;
}

async function loadMine() {
  const list = await api("GET", "/user/deck/configs/mine");
  document.querySelector("#mine-table tbody").innerHTML = list.map(c => {
    const heritage = c.origin_name
      ? `<span class="muted">from ${c.origin_owner_name}/${c.origin_name} v${c.origin_version}</span>` : "";
    return `<tr>
      <td>${c.name}</td><td>v${c.version}</td><td>${heritage}</td>
      <td>
        <a href="/user/deck?edit=${c.id}">edit</a>
        <button class="small" data-versions="${c.id}">versions</button>
        <button class="small danger" data-delfam="${c.id}:${c.name}">delete all</button>
      </td>
    </tr>`;
  }).join("") || `<tr><td colspan="4" class="muted">None yet. Use New config.</td></tr>`;
}

async function loadOthers() {
  const list = await api("GET", "/user/deck/configs/others");
  document.querySelector("#others-table tbody").innerHTML = list.map(c =>
    `<tr>
      <td>${c.owner_name}</td><td>${c.name}</td><td>v${c.version}</td>
      <td><a href="/user/deck?adopt=${c.id}">adopt</a></td>
    </tr>`
  ).join("") || `<tr><td colspan="4" class="muted">None.</td></tr>`;
}

async function showVersions(id) {
  const vs = await api("GET", "/user/deck/configs/" + id + "/versions");
  document.getElementById("versions-panel").innerHTML =
    `<b>Version history</b><br>`
    + vs.map(v => `v${v.version} <a href="/user/deck?edit=${v.id}">load</a> `
                + `<button class="small danger" data-delver="${v.id}">delete</button>`).join("<br>")
    + `<br><button class="small" data-closeversions="1">close</button>`;
}

document.addEventListener("click", async e => {
  const t = e.target;
  try {
    if (t.dataset.versions) { await showVersions(t.dataset.versions); }
    else if (t.dataset.closeversions) { document.getElementById("versions-panel").innerHTML = ""; }
    else if (t.dataset.delver) {
      if (!confirm("Delete this version?")) return;
      await api("DELETE", "/user/deck/configs/" + t.dataset.delver);
      document.getElementById("versions-panel").innerHTML = ""; await loadMine();
    }
    else if (t.dataset.delfam) {
      const [id, name] = t.dataset.delfam.split(":");
      if (!confirm(`Delete ALL versions of "${name}"?`)) return;
      await api("DELETE", "/user/deck/configs/" + id + "/family"); await loadMine();
    }
  } catch (err) { msg(err.message, false); }
});

loadMine().catch(e => msg(e.message, false));
loadOthers().catch(e => msg(e.message, false));
</script>
{% endblock %}
