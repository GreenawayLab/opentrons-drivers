{# Top tab strip for admin pages, mirroring the user tabs. Active tab is derived
   from the request path, so no route passes a flag. Logout lives here. #}
<div class="tabs">
  <div class="tabs-nav">
    <a href="/admin/dashboard"{% if request.url.path == "/admin/dashboard" %} class="active"{% endif %}>Robots</a>
    <a href="/admin/users"{% if request.url.path == "/admin/users" %} class="active"{% endif %}>Users</a>
    <a href="/admin/updates"{% if request.url.path == "/admin/updates" %} class="active"{% endif %}>Driver updates</a>
    <a href="/admin/methods"{% if request.url.path == "/admin/methods" %} class="active"{% endif %}>Methods</a>
  </div>
  <form method="post" action="/logout"><button class="small">Log out ({{ user.name }})</button></form>
</div>
<style>
  .tabs { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid #eee; margin: 0 0 1.2rem; }
  .tabs-nav { display: flex; gap: 4px; }
  .tabs a { padding: 8px 16px; text-decoration: none; color: #666; border-bottom: 2px solid transparent; margin-bottom: -2px; }
  .tabs a.active { color: #000; border-bottom-color: #333; font-weight: 500; }
  .tabs a:hover { color: #000; }
  .tabs form { margin: 0 0 6px; }
  .tabs form button { margin: 0; }
</style>
