version: "3.9"

# Three services across two networks:
#
# - proxy: the only externally-reachable service. Forwards session
#   lifecycle calls to the backend and action calls to agents on the
#   robot subnet.
# - backend: control plane. Reachable only by the proxy via the
#   "internal" network. Has SSH access to robots via the "robot_net"
#   network for bootstrap-time operations.
# - frontend: static UI. Reachable externally.
#
# The "robot_net" network is the bridge to the isolated robot subnet.
# In production this is replaced with a host-level bridge or a VLAN
# interface; for local development a plain bridge is sufficient.

services:
  proxy:
    build: ./proxy
    ports:
      - "8080:8080"
    networks:
      - internal
      - robot_net
    environment:
      BACKEND_URL: "http://backend:8000"
      PROXY_TIMEOUT: "200"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - internal
      - robot_net
    environment:
      DATABASE_URL: "postgresql+psycopg://backend:${POSTGRES_PASSWORD}@db:5432/opentrons"
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      FERNET_KEY: ${FERNET_KEY:?set FERNET_KEY in .env}
    tmpfs:
      - /run/keys
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - proxy

  db:
    image: postgres:16
    networks:
      - internal
    environment:
      POSTGRES_DB: opentrons
      POSTGRES_USER: backend
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backend -d opentrons"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

networks:
  internal:
    driver: bridge
  robot_net:
    driver: bridge
