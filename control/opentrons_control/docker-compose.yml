version: "3.9"

# Four services across two networks:
#
# - proxy: the only externally-reachable service. Forwards session
#   lifecycle/action calls to the backend/agents, and browser traffic to
#   the frontend.
# - backend: control plane and driver-update executor. Reachable only by the
#   proxy and the frontend via the "internal" network. Has SSH access to
#   robots via the "robot_net" network. Holds no driver wheels itself — it
#   installs from a tmpdir and forgets.
# - frontend: HTML renderer. Calls the backend JSON API. Internal-only;
#   reached by the browser exclusively through the proxy.
# - db: postgres. Internal-only.
#
# The "robot_net" network is the bridge to the isolated robot subnet.
# In production this is replaced with a host-level bridge or a VLAN
# interface; for local development a plain bridge is sufficient.
#
# NOTE: the maintainer service (which owns the versioned wheel store and the
# git build) lands in a later batch; it will join "internal" only.

services:
  proxy:
    build: ./proxy
    ports:
      - "8080:8080"
    networks:
      - internal
      - robot_net
    environment:
      BACKEND_URL: "http://backend:8000"
      FRONTEND_URL: "http://frontend:8000"
      PROXY_TIMEOUT: "200"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - internal
      - robot_net
    environment:
      DATABASE_URL: "postgresql+psycopg://backend:${POSTGRES_PASSWORD}@db:5432/opentrons"
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      FERNET_KEY: ${FERNET_KEY:?set FERNET_KEY in .env}
    tmpfs:
      - /run/keys
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    networks:
      - internal
    depends_on:
      - backend

  db:
    image: postgres:16
    networks:
      - internal
    environment:
      POSTGRES_DB: opentrons
      POSTGRES_USER: backend
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backend -d opentrons"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
  robot_net:
    driver: bridge